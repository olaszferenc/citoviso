<!doctype html>
<html lang="hu">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Fixture — gallery lightbox</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600&family=Inter:wght@400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../cit-modules.css">
<style>
/* Archetype theme contract (§A tokens) — deep teal, editorial */
:root{
  --cit-accent:#0f766e; --cit-on-accent:#fff; --cit-ink:#182420; --cit-muted:#5f736d;
  --cit-bg:#f6faf8; --cit-surface:#e7f0ec; --cit-line:#d0e0d9; --cit-radius:10px;
  --cit-font-display:'Fraunces',Georgia,serif; --cit-font-body:'Inter',sans-serif;
  --cit-shadow:0 14px 40px rgba(15,60,50,.14);
}
*{margin:0;box-sizing:border-box}
body{font-family:var(--cit-font-body);background:var(--cit-bg);color:var(--cit-ink)}
.wrap{max-width:1080px;margin:0 auto;padding:48px 24px}
.kicker{text-transform:uppercase;letter-spacing:.22em;font-size:12px;color:var(--cit-accent)}
h1{font-family:var(--cit-font-display);font-size:clamp(30px,4vw,50px);line-height:1.05;font-weight:600;margin:10px 0 30px}
/* In-skin gallery layout (authored per-archetype by the LLM — here a mosaic) */
.mosaic{display:grid;grid-template-columns:repeat(4,1fr);grid-auto-rows:150px;gap:12px}
.mosaic img{width:100%;height:100%;object-fit:cover;border-radius:var(--cit-radius);display:block}
.mosaic .big{grid-column:span 2;grid-row:span 2}
.mosaic .tall{grid-row:span 2}
</style>
</head>
<body>
<div class="wrap">
  <p class="kicker">Villa Meander · Tihany</p>
  <h1>Galéria</h1>

  <!-- MODUL-SLOT: gallery — in-skin markup (real photos), runtime adds lightbox -->
  <section class="mosaic" data-cit-module="gallery">
    <img class="big" src="https://picsum.photos/seed/cit-g1/900/900" alt="A ház a szőlő felől">
    <img src="https://picsum.photos/seed/cit-g2/500/300" alt="Reggeli a teraszon">
    <img class="tall" src="https://picsum.photos/seed/cit-g3/500/700" alt="Panorámás hálószoba">
    <img src="https://picsum.photos/seed/cit-g4/500/300" alt="Kert esti fényben">
    <img src="https://picsum.photos/seed/cit-g5/500/300" alt="Nappali kandallóval">
    <img src="https://picsum.photos/seed/cit-g6/500/300" alt="Kilátás a tóra">
  </section>
</div>
<script src="../cit-runtime.js"></script>
</body>
</html>
